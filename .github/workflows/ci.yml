name: CI

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:

jobs:
  server:
    name: Server (tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server deps
        run: npm install
        working-directory: server
      - name: Run server tests
        run: npm test
        working-directory: server

  client:
    name: Client (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install client deps
        run: npm install
        working-directory: client
      - name: Build client (tsc + vite)
        run: npm run build
        working-directory: client
